// localStorage-based storage shim for standalone deployment
window.storage = window.storage || {
  async get(key, shared) {
    try {
      const v = localStorage.getItem(key);
      return v ? { key, value: v, shared: !!shared } : null;
    } catch(e) { return null; }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem(key, value);
      return { key, value, shared: !!shared };
    } catch(e) { return null; }
  },
  async delete(key, shared) {
    try { localStorage.removeItem(key); return { key, deleted: true, shared: !!shared }; }
    catch(e) { return null; }
  },
  async list(prefix, shared) {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!prefix || k.startsWith(prefix)) keys.push(k);
    }
    return { keys, prefix, shared: !!shared };
  }
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function useStorage(key, fallback) {
  const [val, setVal] = useState(fallback);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(key, true);
        if (r && r.value) setVal(JSON.parse(r.value));
      } catch (e) {}
      setLoaded(true);
    })();
  }, [key]);
  const save = async (v) => {
    setVal(v);
    try { await window.storage.set(key, JSON.stringify(v), true); } catch(e) {}
  };
  return [val, save, loaded];
}

export default function App() {

  const [revealed, setRevealed] = useState(false);
  const [score, setScore] = useState(0);

  const [timeLeft, setTimeLeft] = useState(25);
  const [timerOn, setTimerOn] = useState(false);
  const timerRef = useRef(null);
  const [leaderboard, setLeaderboard, lbLoaded] = useStorage("scrut-quiz-leaderboard-v2", []);

  useEffect(() => {
    if (timerOn && timeLeft > 0) {
      timerRef.current = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    } else if (timerOn && timeLeft === 0) {
      doAnswer(null);
    }
    return () => clearTimeout(timerRef.current);
  }, [timerOn, timeLeft]);

  const startGame = () => {
    if (!name.trim()) return;
    const qs = shuffle(QUESTIONS).slice(0, 12);
    setQuestions(qs);
    setQi(0);
    setScore(0);
    setAnswers([]);
    setSelected(null);
    setRevealed(false);
    setTimeLeft(25);
    setTimerOn(true);
    setPhase("play");
  };

  const doAnswer = useCallback((idx) => {
    setTimerOn(false);
    clearTimeout(timerRef.current);
    setSelected(idx);
    setRevealed(true);
    const q = questions[qi];
    const ok = idx === q.correct;
    const tb = Math.max(0, Math.floor(timeLeft / 2.5));
    const pts = ok ? 10 + tb : 0;
    setScore(s => s + pts);
    setAnswers(a => [...a, { qId: q.id, cat: q.cat, ok, pts, sel: idx }]);
  }, [qi, questions, timeLeft]);

  const nextQ = async () => {
    if (qi + 1 >= questions.length) {
      const finalScore = answers.reduce((s, a) => s + a.pts, 0) + (selected !== null && selected === questions[qi]?.correct ? 10 + Math.max(0, Math.floor(timeLeft / 2.5)) : 0);
      const correctCount = answers.filter(a => a.ok).length + (selected === questions[qi]?.correct ? 1 : 0);
      // Only use the state `score` since it's already been updated in doAnswer
      const entry = { name: name.trim(), score, correct: correctCount, total: questions.length, date: new Date().toISOString() };
      const updated = [...leaderboard, entry].sort((a, b) => b.score - a.score).slice(0, 20);
      await setLeaderboard(updated);
      setPhase("results");
      return;
    }
    setQi(qi + 1);
    setSelected(null);
    setRevealed(false);
    setTimeLeft(25);
    setTimerOn(true);
  };

  const resetGame = () => {
    setPhase("home");
    setName("");
    setSelected(null);
    setRevealed(false);
  };

  const link = "https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap";

  if (phase === "home") {
    return (
      <div style={{ minHeight: "100vh", background: "#080B12", display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: font }}>
        <link href={link} rel="stylesheet" />
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(14,165,233,0.06) 0%, transparent 60%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 480, width: "100%", position: "relative", zIndex: 1 }}>
          <div style={{ textAlign: "center", marginBottom: 48 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "rgba(124,58,237,0.12)", border: "1px solid rgba(124,58,237,0.2)", borderRadius: 100, padding: "6px 16px", marginBottom: 24 }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#7C3AED" }} />
              <span style={{ fontSize: 12, fontWeight: 600, letterSpacing: 2, color: "#A78BFA", textTransform: "uppercase" }}>Scrut Design Team</span>
            </div>
            <h1 style={{ fontSize: 48, fontWeight: 900, color: "#F1F5F9", margin: "0 0 8px", lineHeight: 1.05, letterSpacing: "-0.03em" }}>Know Your<br /><span style={{ background: "linear-gradient(135deg, #7C3AED, #06B6D4)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Boundaries</span></h1>
            <p style={{ color: "#64748B", fontSize: 16, lineHeight: 1.6, maxWidth: 360, margin: "16px auto 0" }}>12 real-world scenarios. What do designers own? When should you push back? How do you say it?</p>
          </div>

          <div style={{ marginBottom: 20 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: "#64748B", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 8, paddingLeft: 4 }}>Your name</label>

            background: name.trim() ? "linear-gradient(135deg, #7C3AED, #6D28D9)" : "rgba(255,255,255,0.04)",
            color: name.trim() ? "#fff" : "#475569", fontSize: 17, fontWeight: 700, cursor: name.trim() ? "pointer" : "not-allowed",
            fontFamily: font, letterSpacing: "0.01em", transition: "all 0.2s",
            boxShadow: name.trim() ? "0 4px 32px rgba(124,58,237,0.25)" : "none"
          }}>
            Start Quiz →
          </button>

          {/* Mini rules */}
          <div style={{ marginTop: 28, display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            {[
              { icon: "⏱", label: "25s per question" },
              { icon: "⚡", label: "Speed bonus points" },
              { icon: "🏆", label: "Shared leaderboard" },
            ].map((r, i) => (
              <div key={i} style={{ background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: "14px 12px", textAlign: "center", border: "1px solid rgba(255,255,255,0.04)" }}>
                <div style={{ fontSize: 20, marginBottom: 4 }}>{r.icon}</div>
                <div style={{ color: "#64748B", fontSize: 12, fontWeight: 500 }}>{r.label}</div>
              </div>
            ))}
          </div>

          {/* Leaderboard preview */}
          {lbLoaded && leaderboard.length > 0 && (
            <div style={{ marginTop: 32 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#475569", letterSpacing: 1.5, textTransform: "uppercase", marginBottom: 10 }}>Recent scores</div>
              {leaderboard.slice(0, 5).map((e, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderRadius: 10, background: i === 0 ? "rgba(124,58,237,0.08)" : "transparent", marginBottom: 2 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 14, width: 24, color: i === 0 ? "#A78BFA" : "#475569", fontWeight: 700 }}>{["🥇","🥈","🥉","4.","5."][i]}</span>
                    <span style={{ color: "#CBD5E1", fontSize: 14, fontWeight: 500 }}>{e.name}</span>
                  </div>
                  <span style={{ color: i === 0 ? "#A78BFA" : "#64748B", fontSize: 14, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{e.score} pts</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── PLAY ──────────────────────────────────────────────────────────────
  if (phase === "play") {
    const q = questions[qi];
    const cc = CAT_COLORS[q.cat] || { bg: "#64748B", light: "#F1F5F9" };
    const progress = ((qi) / questions.length) * 100;
    const timerPct = (timeLeft / 25) * 100;

    return (
      <div style={{ minHeight: "100vh", background: "#080B12", fontFamily: font, padding: "16px 20px 32px" }}>
        <link href={link} rel="stylesheet" />
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: `radial-gradient(ellipse at 50% 0%, ${cc.bg}11 0%, transparent 50%)`, pointerEvents: "none", transition: "background 0.5s" }} />
        <div style={{ maxWidth: 720, margin: "0 auto", position: "relative", zIndex: 1 }}>

          {/* Top bar */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 30, height: 30, borderRadius: 8, background: "rgba(124,58,237,0.15)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, color: "#A78BFA", fontSize: 13 }}>{name[0]}</div>
              <span style={{ color: "#94A3B8", fontSize: 14, fontWeight: 500 }}>{name}</span>
            </div>
            <div style={{ color: "#A78BFA", fontSize: 15, fontWeight: 800, fontVariantNumeric: "tabular-nums" }}>{score} pts</div>
          </div>

          {/* Progress */}
          <div style={{ height: 3, borderRadius: 3, background: "rgba(255,255,255,0.06)", marginBottom: 20, overflow: "hidden" }}>
            <div style={{ width: `${progress}%`, height: "100%", background: `linear-gradient(90deg, ${cc.bg}, #06B6D4)`, transition: "width 0.5s ease", borderRadius: 3 }} />
          </div>

          {/* Category + Timer + Counter */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ display: "inline-block", padding: "4px 10px", borderRadius: 6, background: `${cc.bg}20`, color: cc.bg, fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase" }}>{q.cat}</span>
              <span style={{ color: "#334155", fontSize: 12 }}>·</span>
              <span style={{ color: "#475569", fontSize: 12, fontWeight: 500 }}>{qi + 1}/{questions.length}</span>
              {q.difficulty === "Hard" && <span style={{ padding: "3px 8px", borderRadius: 5, background: "rgba(239,68,68,0.12)", color: "#EF4444", fontSize: 10, fontWeight: 700, letterSpacing: 0.5 }}>HARD</span>}
            </div>
            {!revealed && (
              <div style={{ position: "relative", width: 44, height: 44 }}>
                <svg width={44} height={44} viewBox="0 0 44 44" style={{ transform: "rotate(-90deg)" }}>
                  <circle cx={22} cy={22} r={18} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={3} />
                  <circle cx={22} cy={22} r={18} fill="none" stroke={timeLeft <= 8 ? "#EF4444" : timeLeft <= 15 ? "#F59E0B" : "#10B981"} strokeWidth={3}
                    strokeDasharray={`${2 * Math.PI * 18}`} strokeDashoffset={`${2 * Math.PI * 18 * (1 - timerPct / 100)}`}
                    strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear, stroke 0.3s" }} />
                </svg>
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 14, fontWeight: 800, color: timeLeft <= 8 ? "#EF4444" : timeLeft <= 15 ? "#F59E0B" : "#10B981",
                  fontVariantNumeric: "tabular-nums" }}>{timeLeft}</div>
              </div>
            )}
          </div>

          {/* Scenario card */}
          <div style={{ background: "rgba(255,255,255,0.03)", borderRadius: 16, padding: "18px 22px", marginBottom: 16, borderLeft: `3px solid ${cc.bg}40` }}>
            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: "#475569", textTransform: "uppercase", marginBottom: 8 }}>Scenario</div>
            <div style={{ color: "#CBD5E1", fontSize: 15, lineHeight: 1.75 }}>{q.scenario}</div>
          </div>

          {/* Question */}
          <h2 style={{ color: "#F1F5F9", fontSize: 20, fontWeight: 700, marginBottom: 18, lineHeight: 1.4, margin: "0 0 18px" }}>{q.question}</h2>

          {/* Options */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {q.options.map((opt, i) => {
              const isSel = selected === i;
              const isCorr = i === q.correct;
              let bg = "rgba(255,255,255,0.025)";
              let border = "rgba(255,255,255,0.06)";
              let tc = "#CBD5E1";
              let badge = { bg: "rgba(255,255,255,0.05)", color: "#64748B" };

              if (revealed) {
                if (isCorr) { bg = "rgba(16,185,129,0.1)"; border = "rgba(16,185,129,0.3)"; tc = "#10B981"; badge = { bg: "#10B981", color: "#fff" }; }
                else if (isSel) { bg = "rgba(239,68,68,0.08)"; border = "rgba(239,68,68,0.25)"; tc = "#EF4444"; badge = { bg: "#EF4444", color: "#fff" }; }
                else { tc = "#334155"; }
              }

              return (
                <button key={i} onClick={() => !revealed && doAnswer(i)} disabled={revealed} style={{
                  display: "flex", alignItems: "flex-start", gap: 12, padding: "14px 16px", background: bg,
                  border: `1.5px solid ${border}`, borderRadius: 13, cursor: revealed ? "default" : "pointer",
                  textAlign: "left", transition: "all 0.15s", fontFamily: font, outline: "none"
                }}>
                  <span style={{ width: 26, height: 26, borderRadius: 7, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                    background: badge.bg, color: badge.color, fontSize: 12, fontWeight: 700, transition: "all 0.2s" }}>
                    {revealed ? (isCorr ? "✓" : isSel ? "✗" : String.fromCharCode(65 + i)) : String.fromCharCode(65 + i)}
                  </span>
                  <span style={{ color: tc, fontSize: 15, lineHeight: 1.55, fontWeight: (isSel || (revealed && isCorr)) ? 600 : 400, transition: "color 0.2s" }}>{opt}</span>
                </button>
              );
            })}
          </div>

          {/* Explanation */}
          {revealed && (
            <div style={{
              marginTop: 16, borderRadius: 14, padding: "18px 20px",
              background: selected === q.correct ? "rgba(16,185,129,0.06)" : "rgba(239,68,68,0.04)",
              border: `1px solid ${selected === q.correct ? "rgba(16,185,129,0.15)" : "rgba(239,68,68,0.1)"}`,
            }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: selected === q.correct ? "#10B981" : selected === null ? "#F59E0B" : "#EF4444", marginBottom: 8 }}>
                {selected === q.correct ? `Correct! +${answers[answers.length - 1]?.pts || 10} points` : selected === null ? "Time's up — 0 points" : "Not quite — 0 points"}
              </div>
              <div style={{ color: "#94A3B8", fontSize: 14, lineHeight: 1.75 }}>{q.explain}</div>
            </div>
          )}

          {revealed && (
            <button onClick={nextQ} style={{
              width: "100%", marginTop: 16, padding: "15px 0", borderRadius: 14, border: "none",
              background: `linear-gradient(135deg, ${cc.bg}, ${cc.bg}CC)`, color: "#fff",
              fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: font,
              boxShadow: `0 4px 24px ${cc.bg}30`
            }}>
              {qi + 1 >= questions.length ? "See Results →" : "Next Question →"}
            </button>
          )}
        </div>
      </div>
    );
  }

  // ── RESULTS ───────────────────────────────────────────────────────────
  if (phase === "results") {
    const total = answers.length;
    const correct = answers.filter(a => a.ok).length;
    const pct = Math.round((correct / total) * 100);
    const catBreakdown = {};
    answers.forEach(a => {
      if (!catBreakdown[a.cat]) catBreakdown[a.cat] = { ok: 0, n: 0 };
      catBreakdown[a.cat].n++;
      if (a.ok) catBreakdown[a.cat].ok++;
    });
    const weakCats = Object.entries(catBreakdown).filter(([, d]) => d.ok < d.n).sort((a, b) => (a[1].ok / a[1].n) - (b[1].ok / b[1].n));
    const grade = pct >= 90 ? { label: "Design Lead Material", emoji: "🏆", color: "#10B981" } :
                  pct >= 70 ? { label: "Solid Contributor", emoji: "💪", color: "#06B6D4" } :
                  pct >= 50 ? { label: "Getting There", emoji: "📈", color: "#F59E0B" } :
                              { label: "Review the Docs", emoji: "📚", color: "#EF4444" };

    return (
      <div style={{ minHeight: "100vh", background: "#080B12", fontFamily: font, padding: "24px 20px 40px" }}>
        <link href={link} rel="stylesheet" />
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "radial-gradient(ellipse at 50% 0%, rgba(124,58,237,0.06) 0%, transparent 50%)", pointerEvents: "none" }} />
        <div style={{ maxWidth: 560, margin: "0 auto", position: "relative", zIndex: 1 }}>

          {/* Score hero */}
          <div style={{ textAlign: "center", marginBottom: 36 }}>
            <div style={{ fontSize: 56, marginBottom: 8 }}>{grade.emoji}</div>
            <h1 style={{ fontSize: 36, fontWeight: 900, color: "#F1F5F9", margin: "0 0 4px", letterSpacing: "-0.02em" }}>{score} points</h1>
            <div style={{ color: grade.color, fontSize: 16, fontWeight: 700, marginBottom: 8 }}>{grade.label}</div>
            <div style={{ color: "#64748B", fontSize: 14 }}>{correct}/{total} correct · {pct}% accuracy</div>
          </div>

          {/* Category breakdown */}
          <div style={{ background: "rgba(255,255,255,0.025)", borderRadius: 16, padding: "20px 22px", marginBottom: 20, border: "1px solid rgba(255,255,255,0.04)" }}>
            <h3 style={{ color: "#94A3B8", fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", margin: "0 0 16px" }}>Category Breakdown</h3>
            {Object.entries(catBreakdown).map(([cat, d]) => {
              const cc = CAT_COLORS[cat] || { bg: "#64748B" };
              const r = d.ok / d.n;
              return (
                <div key={cat} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12 }}>
                  <div style={{ width: 110, flexShrink: 0 }}>
                    <span style={{ color: "#94A3B8", fontSize: 13, fontWeight: 500 }}>{cat}</span>
                  </div>
                  <div style={{ flex: 1, height: 6, borderRadius: 4, background: "rgba(255,255,255,0.06)", overflow: "hidden" }}>
                    <div style={{ width: `${r * 100}%`, height: "100%", background: r === 1 ? "#10B981" : cc.bg, borderRadius: 4, transition: "width 0.6s ease" }} />
                  </div>
                  <span style={{ color: r === 1 ? "#10B981" : "#64748B", fontSize: 13, fontWeight: 700, fontVariantNumeric: "tabular-nums", width: 36, textAlign: "right" }}>{d.ok}/{d.n}</span>
                </div>
              );
            })}
          </div>

          {/* Weak areas */}
          {weakCats.length > 0 && (
            <div style={{ background: "rgba(239,68,68,0.04)", borderRadius: 14, padding: "16px 20px", marginBottom: 20, border: "1px solid rgba(239,68,68,0.08)" }}>
              <h3 style={{ color: "#F87171", fontSize: 13, fontWeight: 700, margin: "0 0 10px" }}>Areas to revisit</h3>
              {weakCats.slice(0, 3).map(([cat, d]) => (
                <div key={cat} style={{ color: "#CBD5E1", fontSize: 14, lineHeight: 1.7, marginBottom: 4 }}>
                  <span style={{ fontWeight: 600 }}>{cat}</span> — {d.ok}/{d.n} correct. Review the Ownership Reference doc for this topic.
                </div>
              ))}
            </div>
          )}

          {/* Leaderboard */}
          {leaderboard.length > 0 && (
            <div style={{ background: "rgba(255,255,255,0.025)", borderRadius: 16, padding: "20px 22px", marginBottom: 20, border: "1px solid rgba(255,255,255,0.04)" }}>
              <h3 style={{ color: "#94A3B8", fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", margin: "0 0 14px" }}>Leaderboard</h3>
              {leaderboard.slice(0, 8).map((e, i) => {
                const isMe = e.name === name.trim() && e.score === score;
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", padding: "10px 12px", borderRadius: 10, background: isMe ? "rgba(124,58,237,0.08)" : "transparent", marginBottom: 2 }}>
                    <span style={{ width: 28, fontSize: 14, color: ["#F59E0B", "#94A3B8", "#CD7F32"][i] || "#475569", fontWeight: 800 }}>{i < 3 ? ["🥇","🥈","🥉"][i] : `${i+1}.`}</span>
                    <span style={{ flex: 1, color: isMe ? "#A78BFA" : "#CBD5E1", fontSize: 14, fontWeight: isMe ? 700 : 500 }}>{e.name}{isMe ? " (you)" : ""}</span>
                    <span style={{ color: isMe ? "#A78BFA" : "#64748B", fontSize: 14, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{e.score}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* GitHub hosting instructions */}
          <div style={{ background: "rgba(255,255,255,0.025)", borderRadius: 16, padding: "20px 22px", marginBottom: 24, border: "1px solid rgba(255,255,255,0.04)" }}>
            <h3 style={{ color: "#94A3B8", fontSize: 12, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", margin: "0 0 12px" }}>Share with your team</h3>
            <p style={{ color: "#64748B", fontSize: 14, lineHeight: 1.7, margin: "0 0 6px" }}>
              Send this game link to your teammates — everyone plays individually and scores appear on the shared leaderboard above.
            </p>
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { resetGame(); }} style={{
              flex: 1, padding: "15px 0", borderRadius: 14, border: "1.5px solid rgba(255,255,255,0.08)",
              background: "transparent", color: "#94A3B8", fontSize: 15, fontWeight: 600,
              cursor: "pointer", fontFamily: font
            }}>
              Home
            </button>
            <button onClick={() => { setPhase("home"); setName(""); }} style={{
              flex: 1, padding: "15px 0", borderRadius: 14, border: "none",
              background: "linear-gradient(135deg, #7C3AED, #6D28D9)", color: "#fff",
              fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: font,
              boxShadow: "0 4px 24px rgba(124,58,237,0.25)"
            }}>
              Play Again
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
